services:
  # Stdio transport (default) - for MCP client integration
  abuseipdb-mcp:
    profiles:
      - "stdio"
    image: n3r0b1n4ry/abuseipdb-mcp:latest
    build: .
    container_name: abuseipdb-mcp
    environment:
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - mcp-network
    labels:
      - "com.docker.compose.project=abuseipdb-mcp"
      - "description=AbuseIPDB MCP Server - Stdio Transport"

  # Streamable HTTP transport - for remote/multi-client access
  abuseipdb-mcp-http:
    profiles:
      - "http"
    image: n3r0b1n4ry/abuseipdb-mcp:latest
    build: .
    container_name: abuseipdb-mcp
    environment:
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - mcp-network
    labels:
      - "com.docker.compose.project=abuseipdb-mcp"
      - "description=AbuseIPDB MCP Server - Streamable HTTP Transport"

networks:
  mcp-network:
    driver: bridge
